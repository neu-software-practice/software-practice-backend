# Dev 环境独立 Compose 配置
# 与生产完全隔离：独立容器名、端口、网络、数据卷

services:
  app:
    build:
      context: .
      args:
        - GOPROXY=https://goproxy.cn,direct
    container_name: neuhis-backend-dev
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      - DATABASE_DSN=root:password@tcp(mysql-dev:3306)/neuhis_dev?charset=utf8mb4&parseTime=True&loc=Local
      - MEDAGENT_BASE_URL=http://medagent-dev:8080
      - SERVER_MODE=debug
      - LOG_LEVEL=debug
    depends_on:
      mysql-dev:
        condition: service_healthy
      medagent-dev:
        condition: service_started
    networks:
      - neuhis-dev-net
    restart: unless-stopped

  mysql-dev:
    image: mysql:8.4@sha256:d36d39a64cd12a5c1cc9e6aa2bfb5f8d4c81a2f6586e0a04a9ae13939db02209
    container_name: neuhis-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: neuhis_dev
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data-dev:/var/lib/mysql
    networks:
      - neuhis-dev-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  medagent-dev:
    image: golang:1.25-alpine@sha256:523c3effe300580ed375e43f43b1c9b091b68e935a7c3a92bfcc4e7ed55b18c2
    container_name: neuhis-medagent-dev
    working_dir: /app
    volumes:
      - ./medAgent:/app
    command: >
      sh -c "CGO_ENABLED=0 go run ./cmd/server
      -addr :8080
      -provider $${MEDAGENT_PROVIDER:-deepseek}
      -model $${MEDAGENT_MODEL:-deepseek-chat}
      -log-dir /tmp/medagent-logs"
    environment:
      - DEEPSEEK_API_KEY=${MEDAGENT_API_KEY}
      - DASHSCOPE_API_KEY=${MEDAGENT_API_KEY}
      - OPENAI_API_KEY=${MEDAGENT_API_KEY}
      - GOPROXY=https://goproxy.cn,direct
      - GOSUMDB=off
    ports:
      - "8082:8080"
    networks:
      - neuhis-dev-net
    restart: unless-stopped

networks:
  neuhis-dev-net:
    driver: bridge

volumes:
  mysql-data-dev:
