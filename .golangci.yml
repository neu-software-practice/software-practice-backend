version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - unconvert
  settings:
    gosec:
      excludes:
        - G104
  exclusions:
    rules:
      - path: '(.+)_test\.go'
        linters:
          - gosec
      - path: 'tests/'
        linters:
          - gosec
    paths:
      - tests/

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
  tests: true
