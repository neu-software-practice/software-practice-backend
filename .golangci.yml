version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - unconvert

linters-settings:
  gosec:
    excludes:
      - G104

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-rules:
    - path: '(.+)_test\.go'
      linters:
        - gosec
    - path: 'tests/'
      linters:
        - gosec
  exclude-dirs:
    - tests

run:
  timeout: 5m
  tests: true
