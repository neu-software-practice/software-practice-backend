name: CD - Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, cd]
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.yml.local

    steps:
      - name: Set deploy directory
        run: echo "APP_DIR=$HOME/app/software-practice-backend" >> $GITHUB_ENV

      - name: Clone or pull latest code
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # 清理所有旧 token（包括此前因 key 不匹配而残留的）
          git config --global --list 2>/dev/null | { grep "x-access-token" || true; } | cut -d= -f1 | while read key; do
            git config --global --unset-all "$key" 2>/dev/null || true
          done
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global url."https://github.com/".insteadOf "git@github.com:"

          # 网络波动重试函数
          retry() {
            local desc="$1"; shift
            for i in 1 2 3; do
              echo "[attempt $i/3] $desc"
              if "$@"; then return 0; fi
              echo "  -> failed, retrying in $((i*5))s..."
              sleep $((i*5))
            done
            echo "  -> all attempts failed"
            return 1
          }

          if [ -d "${APP_DIR}/.git" ]; then
            echo "Existing repo found, pulling latest main..."
            cd "${APP_DIR}"
            retry "git fetch" git fetch origin main
            git reset --hard origin/main
            git submodule update --init --recursive
          else
            echo "First deployment, cloning repository..."
            mkdir -p "${APP_DIR}"
            retry "git clone" git clone --branch main --depth 1 \
              https://github.com/neu-software-practice/software-practice-backend.git \
              "${APP_DIR}"
            cd "${APP_DIR}"
            git submodule update --init --recursive
          fi
          echo "Deploying commit: $(git -C "${APP_DIR}" rev-parse --short HEAD)"

      - name: Rebuild and restart app
        id: docker-up
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail
          docker compose up -d --build app
          echo "Waiting for service health..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "✅ Service is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "📋 Health check response:"
          curl -s http://localhost:8080/api/health | python3 -m json.tool || true

      - name: Run database migrations
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail
          echo "Running database migrations..."
          for f in db/migrations/*.up.sql; do
            echo "  Running: $f"
            docker compose exec -T mysql mysql -u root -ppassword neuhis < "$f" 2>/dev/null || echo "  (may already be applied)"
          done
          echo "✅ Migrations complete"

      - name: Verify deployment
        id: verify
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail
          STATUS=$(curl -sf http://localhost:8080/api/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
          echo "Health check status: $STATUS"
          docker compose ps

      - name: Collect logs on failure
        if: failure() && steps.docker-up.outcome == 'success'
        working-directory: ${{ env.APP_DIR }}
        run: |
          echo "=== App logs (last 50 lines) ==="
          docker compose logs --tail=50 app || true
          echo "=== MySQL logs (last 20 lines) ==="
          docker compose logs --tail=20 mysql || true

      - name: Cleanup old images
        working-directory: ${{ env.APP_DIR }}
        run: |
          docker image prune -f
