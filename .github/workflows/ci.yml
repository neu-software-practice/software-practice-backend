name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_DSN: root:password@tcp(127.0.0.1:3306)/neuhis_test?charset=utf8mb4&parseTime=True&loc=Local
  JWT_SECRET: test-jwt-secret-at-least-32-bytes-long-for-ci
  CORS_ALLOWED_ORIGINS: http://localhost:5173
  SERVER_MODE: test

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: neuhis_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ppassword"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Lint
        run: golangci-lint run ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out $(go list ./... | grep -v /cmd/server | grep -v /tests/testutil | grep -v /internal/service/medagent)

      - name: Check Service Layer Coverage (>=90%)
        run: |
          echo "=== Service Layer Coverage (target: >=90%) ==="
          FAIL=0
          for pkg in ./internal/service/patient/... ./internal/service/visit/... ./internal/service/workbench/...; do
            COV=$(go tool cover -func=coverage.out 2>/dev/null | grep "$pkg" | tail -1 | awk '{print $NF}')
            if [ -z "$COV" ]; then COV="0.0%"; fi
            COV_NUM=$(echo "$COV" | sed 's/%//')
            echo "  $pkg: $COV"
            if (( $(echo "$COV_NUM < 90" | bc -l) )); then
              echo "  -> FAIL: below 90%"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "Service layer coverage below 90% threshold"
            exit 1
          fi
          echo "Service layer coverage check passed"

      - name: Check Total Unit Coverage (>=75%)
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage (unit tests): ${TOTAL}%"
          THRESHOLD=75
          if (( $(echo "$TOTAL < $THRESHOLD" | bc -l) )); then
            echo "Total coverage ${TOTAL}% is below ${THRESHOLD}% threshold"
            exit 1
          fi
          echo "Total coverage check passed: ${TOTAL}%"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Run integration tests
        run: go test -v -race -count=1 -timeout 600s ./internal/repository/...

  smoke:
    name: Smoke Test (Docker Compose + Newman)
    runs-on: ubuntu-latest
    needs: integration
    env:
      MEDAGENT_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      MEDAGENT_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'http://medagent:8080' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Create .env
        run: |
          cp .env.example .env
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${JWT_SECRET}|" .env
          sed -i "s|^DATABASE_DSN=.*|DATABASE_DSN=root:password@tcp(mysql:3306)/neuhis?charset=utf8mb4&parseTime=True&loc=Local|" .env
          sed -i "s|^MEDAGENT_API_KEY=.*|MEDAGENT_API_KEY=$MEDAGENT_API_KEY|" .env
          sed -i "s|^MEDAGENT_BASE_URL=.*|MEDAGENT_BASE_URL=$MEDAGENT_BASE_URL|" .env
          echo "=== .env (secrets masked) ==="
          cat .env | sed 's/\(MEDAGENT_API_KEY=\)[^ ]*/\1******/'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Run Smoke Tests
        id: smoke
        run: make smoke-test-docker
        timeout-minutes: 20

      - name: Collect logs on failure
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "=== App logs ==="
          docker compose logs app || true
          echo "=== Newman report ==="
          cat tests/newman/reports/summary_*.txt 2>/dev/null || echo "No report found"

      - name: Cleanup
        if: always()
        run: docker compose down -v
