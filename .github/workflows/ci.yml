name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: neuhis_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ppassword"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Lint
        run: golangci-lint run ./...

      - name: Test
        env:
          TEST_DATABASE_DSN: root:password@tcp(127.0.0.1:3306)/neuhis_test?charset=utf8mb4&parseTime=True&loc=Local
          JWT_SECRET: test-jwt-secret-at-least-32-bytes-long-for-ci
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          SERVER_MODE: test
        run: go test -race -cover ./...

      - name: Check Coverage
        env:
          TEST_DATABASE_DSN: root:password@tcp(127.0.0.1:3306)/neuhis_test?charset=utf8mb4&parseTime=True&loc=Local
          JWT_SECRET: test-jwt-secret-at-least-32-bytes-long-for-ci
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          SERVER_MODE: test
        run: |
          go test -race -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 90% threshold"
            exit 1
          fi
          echo "Coverage check passed: $COVERAGE%"

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Create .env
        run: cp .env.example .env

      - name: Start services
        run: docker-compose up -d --build

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/api/health && break
            sleep 2
          done

      - name: Run Newman
        uses: postmanlabs/newman-action@v2
        with:
          collection: tests/newman/neuhis-agent.postman_collection.json
          environment: tests/newman/neuhis-agent.postman_environment.json

      - name: Cleanup
        if: always()
        run: docker-compose down -v
