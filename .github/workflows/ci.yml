name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  DATABASE_DSN: root:password@tcp(127.0.0.1:3306)/neuhis_test?charset=utf8mb4&parseTime=True&loc=Local
  JWT_SECRET: test-jwt-secret-at-least-32-bytes-long-for-ci
  CORS_ALLOWED_ORIGINS: http://localhost:5173
  SERVER_MODE: test

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: neuhis_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ppassword"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2

      - name: Lint
        run: golangci-lint run ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out -short ./...

      - name: Check Service Layer Coverage (>=90%)
        run: |
          echo "=== Service Layer Coverage (target: >=90%) ==="
          FAIL=0
          for pkg in ./internal/service/patient/... ./internal/service/visit/... ./internal/service/workbench/...; do
            COV=$(go tool cover -func=coverage.out 2>/dev/null | grep "$pkg" | tail -1 | awk '{print $NF}')
            if [ -z "$COV" ]; then COV="0.0%"; fi
            COV_NUM=$(echo "$COV" | sed 's/%//')
            echo "  $pkg: $COV"
            if (( $(echo "$COV_NUM < 90" | bc -l) )); then
              echo "  -> FAIL: below 90%"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "Service layer coverage below 90% threshold"
            exit 1
          fi
          echo "Service layer coverage check passed"

      - name: Check Total Unit Coverage (>=80%)
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage (unit tests): ${TOTAL}%"
          THRESHOLD=80
          if (( $(echo "$TOTAL < $THRESHOLD" | bc -l) )); then
            echo "Total coverage ${TOTAL}% is below ${THRESHOLD}% threshold"
            exit 1
          fi
          echo "Total coverage check passed: ${TOTAL}%"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run integration tests
        run: go test -v -race -count=1 -timeout 600s -coverprofile=integration.out ./internal/repository/...

      - name: Check Combined Coverage (unit + integration >=80%)
        run: |
          # Merge coverage profiles
          echo "mode: set" > combined.out
          tail -n +2 coverage.out >> combined.out 2>/dev/null
          tail -n +2 integration.out >> combined.out 2>/dev/null
          TOTAL=$(go tool cover -func=combined.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Combined coverage (unit + integration): ${TOTAL}%"
          THRESHOLD=80
          if (( $(echo "$TOTAL < $THRESHOLD" | bc -l) )); then
            echo "Combined coverage ${TOTAL}% is below ${THRESHOLD}% threshold"
            exit 1
          fi
          echo "Combined coverage check passed: ${TOTAL}%"

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Create .env
        run: cp .env.example .env

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/api/health && break
            sleep 2
          done

      - name: Run Newman
        uses: postmanlabs/newman-action@v2
        with:
          collection: tests/newman/neuhis-agent.postman_collection.json
          environment: tests/newman/neuhis-agent.postman_environment.json

      - name: Cleanup
        if: always()
        run: docker compose down -v
