name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  DATABASE_DSN: root:password@tcp(127.0.0.1:3306)/neuhis_test?charset=utf8mb4&parseTime=True&loc=Local
  JWT_SECRET: test-jwt-secret-at-least-32-bytes-long-for-ci
  CORS_ALLOWED_ORIGINS: http://localhost:5173
  SERVER_MODE: test

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: neuhis_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ppassword"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Lint
        run: golangci-lint run ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out $(go list ./... | grep -v /cmd/server | grep -v /tests/testutil | grep -v /internal/service/medagent)

      - name: Check Service Layer Coverage (>=90%)
        run: |
          echo "=== Service Layer Coverage (target: >=90%) ==="
          FAIL=0
          for pkg in ./internal/service/patient/... ./internal/service/visit/... ./internal/service/workbench/...; do
            COV=$(go tool cover -func=coverage.out 2>/dev/null | grep "$pkg" | tail -1 | awk '{print $NF}')
            if [ -z "$COV" ]; then COV="0.0%"; fi
            COV_NUM=$(echo "$COV" | sed 's/%//')
            echo "  $pkg: $COV"
            if (( $(echo "$COV_NUM < 90" | bc -l) )); then
              echo "  -> FAIL: below 90%"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "Service layer coverage below 90% threshold"
            exit 1
          fi
          echo "Service layer coverage check passed"

      - name: Check Total Unit Coverage (>=75%)
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage (unit tests): ${TOTAL}%"
          THRESHOLD=75
          if (( $(echo "$TOTAL < $THRESHOLD" | bc -l) )); then
            echo "Total coverage ${TOTAL}% is below ${THRESHOLD}% threshold"
            exit 1
          fi
          echo "Total coverage check passed: ${TOTAL}%"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Run integration tests
        run: go test -v -race -count=1 -timeout 600s ./internal/repository/...

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Create .env
        run: |
          cp .env.example .env
          # Override JWT_SECRET with CI value for consistent token generation
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${JWT_SECRET}|" .env

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/api/health && break
            sleep 2
          done

      - name: Install MySQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client

      - name: Run database migrations
        run: |
          for f in db/migrations/*.up.sql; do
            echo "Running migration: $f"
            mysql -h 127.0.0.1 -u root -ppassword neuhis < "$f"
          done

      - name: Create test patient
        run: |
          RESP=$(curl -s -X POST http://localhost:8080/api/patients/verify \
            -H "Content-Type: application/json" \
            -d '{"credentialType":"phone","credential":"13900000001","name":"测试患者"}')
          echo "Verify response: $RESP"
          PATIENT_ID=$(echo "$RESP" | jq -r '.data.patient.id')
          if [ "$PATIENT_ID" = "null" ] || [ -z "$PATIENT_ID" ]; then
            echo "ERROR: Failed to create test patient"
            exit 1
          fi
          echo "PATIENT_ID=$PATIENT_ID" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Generate JWT token
        run: |
          TOKEN=$(go run ./cmd/jwtgen "$PATIENT_ID")
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Failed to generate JWT token"
            exit 1
          fi
          echo "TOKEN generated"

          # Update the Newman environment file with real token and patient ID
          jq --arg token "$TOKEN" --arg pid "$PATIENT_ID" \
            '.values |= map(if .key == "token" then .value = $token elif .key == "patientId" then .value = $pid else . end)' \
            tests/newman/neuhis-agent.postman_environment.json > /tmp/env.json
          mv /tmp/env.json tests/newman/neuhis-agent.postman_environment.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman
        run: |
          newman run tests/newman/neuhis-agent.postman_collection.json \
            -e tests/newman/neuhis-agent.postman_environment.json \
            --timeout-request 30000

      - name: Cleanup
        if: always()
        run: docker compose down -v
