basePath: /api
definitions:
  github_com_neu-software-practice_software-practice-backend_internal_dto.ChargeItemRef:
    properties:
      id:
        type: integer
      item_type:
        description: check/inspection/disposal/prescription
        type: string
    required:
    - id
    - item_type
    type: object
  github_com_neu-software-practice_software-practice-backend_internal_dto.ChargeRequest:
    properties:
      case_number:
        type: string
      items:
        items:
          $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_dto.ChargeItemRef'
        minItems: 1
        type: array
    required:
    - case_number
    - items
    type: object
  github_com_neu-software-practice_software-practice-backend_internal_dto.CreateRequestInput:
    properties:
      info:
        type: string
      position:
        type: string
      register_id:
        type: integer
      remark:
        type: string
      tech_id:
        type: integer
    required:
    - register_id
    - tech_id
    type: object
  github_com_neu-software-practice_software-practice-backend_internal_dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  github_com_neu-software-practice_software-practice-backend_internal_dto.RegisterRequest:
    properties:
      age:
        type: integer
      age_type:
        type: string
      birthdate:
        description: YYYY-MM-DD
        type: string
      card_number:
        type: string
      deptment_id:
        type: integer
      employee_id:
        type: integer
      gender:
        type: string
      home_address:
        type: string
      is_book:
        type: string
      real_name:
        type: string
      regist_level_id:
        type: integer
      regist_method:
        type: string
      settle_category_id:
        type: integer
    required:
    - deptment_id
    - employee_id
    - gender
    - real_name
    - regist_level_id
    - settle_category_id
    type: object
  github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body:
    properties:
      data: {}
      error:
        $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.ErrorBody'
      meta:
        $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Meta'
      success:
        type: boolean
    type: object
  github_com_neu-software-practice_software-practice-backend_internal_pkg_response.ErrorBody:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Meta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
info:
  contact: {}
  description: 门诊全流程后端：挂号收费 / 门诊医生 / 检查 / 检验 / 处置 / 药房。
  title: 东软云医院 HIS 门诊管理 API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录凭据
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
      summary: 登录
      tags:
      - auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
      security:
      - BearerAuth: []
      summary: 当前用户
      tags:
      - auth
  /charges:
    post:
      consumes:
      - application/json
      parameters:
      - description: 结算项目
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_dto.ChargeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
      security:
      - BearerAuth: []
      summary: 收费结算 (F1-3)
      tags:
      - charge
  /charges/pending:
    get:
      parameters:
      - description: 病历号
        in: query
        name: case_number
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
      security:
      - BearerAuth: []
      summary: 待缴费项目 (F1-3)
      tags:
      - charge
  /check-requests:
    post:
      consumes:
      - application/json
      parameters:
      - description: 申请信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_dto.CreateRequestInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
      security:
      - BearerAuth: []
      summary: 开立检查/检验/处置申请 (F2-3/F2-4/F2-10, inspection/disposal 同构)
      tags:
      - request
  /departments:
    get:
      parameters:
      - description: 科室类型(财务/门诊/检查/检验/药房/处置)
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
      security:
      - BearerAuth: []
      summary: 科室列表
      tags:
      - catalog
  /pharmacy/prescriptions/{id}/dispense:
    post:
      parameters:
      - description: 处方ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
      security:
      - BearerAuth: []
      summary: 药房发药 (F5-1)
      tags:
      - pharmacy
  /physician/registers/{id}/consult:
    post:
      parameters:
      - description: 挂号ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
      security:
      - BearerAuth: []
      summary: 创建病历开始看诊 (F2-1)
      tags:
      - physician
  /registers:
    post:
      consumes:
      - application/json
      parameters:
      - description: 挂号信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_neu-software-practice_software-practice-backend_internal_pkg_response.Body'
      security:
      - BearerAuth: []
      summary: 窗口挂号
      tags:
      - registration
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
