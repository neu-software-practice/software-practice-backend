repos:
  - repo: local
    hooks:
      - id: go-test-cover
        name: Go Test Cover (service>=90%, total>=80%)
        entry: bash scripts/precommit-check.sh
        language: system
        pass_filenames: false
        timeout: 600
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run ./...
        language: system
        pass_filenames: false
        types: [go]
