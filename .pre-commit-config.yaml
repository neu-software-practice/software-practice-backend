repos:
  - repo: local
    hooks:
      - id: go-test
        name: Go Test (local only, no Docker)
        entry: go test -count=1 -short ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run ./...
        language: system
        pass_filenames: false
        types: [go]
