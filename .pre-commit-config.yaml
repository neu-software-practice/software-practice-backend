repos:
  - repo: local
    hooks:
      - id: go-test
        name: Go Coverage Gate
        entry: bash scripts/precommit-check.sh
        language: system
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run ./...
        language: system
        pass_filenames: false
        types: [go]
